<!DOCTYPE html>
<!-- author : mohit -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathViz — Equation Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090c;
    --surface: #0f1117;
    --surface2: #161822;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e9f0;
    --muted: #6b6d80;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --accent3: #6dfacc;
    --accent4: #fac46d;
    --grid: rgba(255,255,255,0.04);
    --glow: rgba(124,109,250,0.15);
  }
  [data-theme="light"] {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eeecea;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --text: #1a1b26;
    --muted: #8a8b9a;
    --glow: rgba(124,109,250,0.08);
    --grid: rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* Intro screen */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    animation: introOut 0.6s ease 2.4s forwards;
  }
  @keyframes introOut {
    to { opacity: 0; pointer-events: none; }
  }
  .intro-logo {
    font-size: 72px; font-weight: 800; letter-spacing: -4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: logoIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }
  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .intro-sub {
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase;
    animation: fadeUp 0.5s ease 0.8s both;
  }
  .intro-bar {
    width: 200px; height: 2px;
    background: var(--border);
    border-radius: 2px; overflow: hidden;
    animation: fadeUp 0.5s ease 0.9s both;
  }
  .intro-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    animation: barFill 1.6s ease 1s forwards;
  }
  @keyframes barFill { from { width: 0; } to { width: 100%; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Layout */
  #app {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    animation: appIn 0.5s ease 2.8s both;
  }
  @keyframes appIn { from { opacity: 0; } to { opacity: 1; } }

  /* Header */
  header {
    grid-column: 1 / -1;
    display: flex; align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 16px;
    position: relative; z-index: 10;
  }
  .logo-text {
    font-size: 18px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sep { flex: 1; }
  .header-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 6px;
  }
  .header-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .theme-toggle {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--accent); border-color: var(--accent); }

  /* Sidebar */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  /* Equation input */
  .eq-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .eq-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  .eq-prefix {
    font-family: 'Space Mono', monospace;
    font-size: 14px; color: var(--accent); font-weight: 700;
  }
  .eq-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Space Mono', monospace; font-size: 14px;
    color: var(--text);
  }
  .eq-input::placeholder { color: var(--muted); }

  /* Equation list */
  .eq-list { display: flex; flex-direction: column; gap: 8px; }
  .eq-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    animation: slideIn 0.3s ease;
    position: relative; overflow: hidden;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .eq-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .eq-color-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .eq-item-text {
    flex: 1; font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer;
  }
  .eq-item-text.error { color: #ff6b6b; }
  .eq-vis-btn, .eq-del-btn {
    width: 22px; height: 22px; border-radius: 4px;
    background: none; border: 1px solid var(--border2);
    cursor: pointer; font-size: 11px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .eq-vis-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .eq-del-btn:hover { background: #ff4444; border-color: #ff4444; color: white; }
  .eq-item.hidden { opacity: 0.4; }
  .add-eq-btn {
    width: 100%; padding: 9px;
    background: none; border: 1px dashed var(--border2);
    border-radius: 8px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 12px;
    color: var(--muted); font-weight: 600;
    transition: all 0.2s; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-eq-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }

  /* Math keyboard */
  .kb-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }
  .kb-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 11px; padding: 7px 4px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    text-align: center; line-height: 1.2;
  }
  .kb-btn:hover { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.05); }
  .kb-btn:active { transform: scale(0.95); }
  .kb-btn.accent { background: rgba(124,109,250,0.15); border-color: rgba(124,109,250,0.3); color: var(--accent); }
  .kb-btn.accent:hover { background: var(--accent); color: white; }

  /* Sliders */
  .slider-list { display: flex; flex-direction: column; gap: 10px; }
  .slider-item { display: flex; flex-direction: column; gap: 4px; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; }
  .slider-name {
    font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent);
  }
  .slider-val {
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
  }
  .slider-track {
    -webkit-appearance: none; width: 100%; height: 3px;
    border-radius: 2px; background: var(--border2);
    outline: none; cursor: pointer;
  }
  .slider-track::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    border: 2px solid var(--surface);
  }

  /* Main canvas area */
  main {
    position: relative; background: var(--bg);
    overflow: hidden;
  }
  #graphCanvas {
    width: 100%; height: 100%; display: block;
  }
  .canvas-overlay {
    position: absolute; inset: 0; pointer-events: none;
  }
  .axis-label {
    position: absolute; font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--muted);
  }
  .zoom-controls {
    position: absolute; bottom: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .graph-info {
    position: absolute; top: 12px; left: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
  }
  .cursor-coords {
    position: absolute; pointer-events: none;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--text); background: var(--surface);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 4px 8px; display: none;
  }
  .sidebar-scroll {
    overflow-y: auto; flex: 1; scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* Export menu */
  .export-menu {
    position: absolute; top: 60px; right: 0;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 4px;
    min-width: 140px; z-index: 50;
    display: none; flex-direction: column; gap: 2px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .export-menu.open { display: flex; }
  .export-item {
    padding: 8px 12px; border-radius: 6px;
    font-size: 13px; cursor: pointer;
    transition: background 0.15s;
    font-family: 'Syne', sans-serif;
  }
  .export-item:hover { background: var(--surface2); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 20px;
    font-size: 13px; font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200; pointer-events: none;
    display: flex; align-items: center; gap: 8px;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
    aside { max-height: 45vh; overflow-y: auto; }
    main { min-height: 50vh; }
  }
</style>
</head>
<body>

<!-- Intro screen -->
<div id="intro">
  <div class="intro-logo">MathViz</div>
  <div class="intro-sub">Equation Visualizer</div>
  <div class="intro-bar"><div class="intro-bar-fill"></div></div>
</div>

<div id="app">
  <!-- Header -->
  <header>
    <div class="logo-text">MathViz</div>
    <span style="font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;">equation visualizer</span>
    <div class="header-sep"></div>
    <button class="header-btn" onclick="saveEquations()">💾 Save</button>
    <button class="header-btn" onclick="loadEquations()">📂 Load</button>
    <div style="position:relative">
      <button class="header-btn" onclick="toggleExport()">📤 Export</button>
      <div class="export-menu" id="exportMenu">
        <div class="export-item" onclick="exportPNG()">Export as PNG</div>
        <div class="export-item" onclick="exportSVGFile()">Export as SVG</div>
      </div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </header>

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-scroll">
      <!-- Equation input -->
      <div class="sidebar-section">
        <div class="sidebar-label">New Equation</div>
        <div class="eq-input-wrap">
          <span class="eq-prefix">y =</span>
          <input class="eq-input" id="mainInput" placeholder="x^2, sin(x), ..." 
                 onkeydown="handleInputKey(event)" oninput="handleInputChange()">
        </div>
        <div style="margin-top:8px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);min-height:16px" id="inputPreview"></div>
      </div>

      <!-- Equation list -->
      <div class="sidebar-section">
        <div class="sidebar-label">Equations</div>
        <div class="eq-list" id="eqList"></div>
        <button class="add-eq-btn" onclick="addCurrentEquation()">+ Add Equation</button>
      </div>

      <!-- Math keyboard -->
      <div class="sidebar-section">
        <div class="sidebar-label">Math Keyboard</div>
        <div class="kb-grid" id="mathKb"></div>
      </div>

      <!-- Variable sliders -->
      <div class="sidebar-section" id="slidersSection" style="display:none">
        <div class="sidebar-label">Variable Sliders</div>
        <div class="slider-list" id="sliderList"></div>
      </div>

      <!-- Viewport controls -->
      <div class="sidebar-section">
        <div class="sidebar-label">Viewport</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">X min</div>
            <input type="number" id="xmin" value="-10" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;outline:none" onchange="updateViewport()">
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">X max</div>
            <input type="number" id="xmax" value="10" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;outline:none" onchange="updateViewport()">
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Y min</div>
            <input type="number" id="ymin" value="-10" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;outline:none" onchange="updateViewport()">
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Y max</div>
            <input type="number" id="ymax" value="10" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;outline:none" onchange="updateViewport()">
          </div>
        </div>
        <button style="width:100%;margin-top:8px;padding:8px;background:none;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;color:var(--muted);font-weight:600;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--muted)'" onclick="resetViewport()">Reset View</button>
      </div>
    </div>
  </aside>

  <!-- Canvas -->
  <main id="mainCanvas">
    <canvas id="graphCanvas"></canvas>
    <div class="cursor-coords" id="cursorCoords"></div>
    <div class="graph-info" id="graphInfo">Pan: drag · Zoom: scroll</div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="resetViewport()">⌂</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
    </div>
  </main>
</div>

<div id="toast">✓ <span id="toastMsg"></span></div>

<script>
// ============================================================
// State
// ============================================================
const COLORS = ['#7c6dfa','#fa6d9a','#6dfacc','#fac46d','#6db4fa','#fa9b6d','#c46dfa','#6dfaa8'];
let equations = [];
let viewport = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };
let sliders = {}; // { a: 1, b: 0, ... }
let isDark = true;
let animFrame = null;
let activeEqIndex = -1;
let animProgress = {}; // per-eq animation progress

// Pan/zoom state
let isPanning = false;
let panStart = { x: 0, y: 0 };
let panViewport = null;

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

// ============================================================
// Math keyboard layout
// ============================================================
const KB_KEYS = [
  { label: '7',   insert: '7' },   { label: '8',   insert: '8' },   { label: '9',   insert: '9' },   { label: '(',   insert: '(' },   { label: ')',   insert: ')' },
  { label: '4',   insert: '4' },   { label: '5',   insert: '5' },   { label: '6',   insert: '6' },   { label: '+',   insert: '+' },   { label: '−',   insert: '-' },
  { label: '1',   insert: '1' },   { label: '2',   insert: '2' },   { label: '3',   insert: '3' },   { label: '×',   insert: '*' },   { label: '÷',   insert: '/' },
  { label: '0',   insert: '0' },   { label: '.',   insert: '.' },   { label: 'x',   insert: 'x', accent: true }, { label: '^',   insert: '^' },   { label: '⌫',   insert: 'BACK' },
  { label: 'x²',  insert: '^2', accent: true }, { label: 'x³',  insert: '^3', accent: true }, { label: 'x^n', insert: '^', accent: true }, { label: '√',   insert: 'sqrt(', accent: true }, { label: '∛',   insert: 'cbrt(', accent: true },
  { label: 'sin', insert: 'sin(', accent: true }, { label: 'cos', insert: 'cos(', accent: true }, { label: 'tan', insert: 'tan(', accent: true }, { label: 'log', insert: 'log(', accent: true }, { label: 'ln',  insert: 'log(', accent: true },
  { label: 'π',   insert: 'pi', accent: true }, { label: 'e',   insert: 'e', accent: true }, { label: '|x|', insert: 'abs(', accent: true }, { label: '[',   insert: '[' }, { label: ']',   insert: ']' },
];

function buildKeyboard() {
  const kb = document.getElementById('mathKb');
  KB_KEYS.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'kb-btn' + (k.accent ? ' accent' : '');
    btn.textContent = k.label;
    btn.onclick = () => insertAtCursor(k.insert);
    kb.appendChild(btn);
  });
}

function insertAtCursor(val) {
  const inp = document.getElementById('mainInput');
  inp.focus();
  if (val === 'BACK') {
    const s = inp.selectionStart, e = inp.selectionEnd;
    if (s === e && s > 0) {
      inp.value = inp.value.slice(0, s-1) + inp.value.slice(e);
      inp.setSelectionRange(s-1, s-1);
    } else {
      inp.value = inp.value.slice(0, s) + inp.value.slice(e);
      inp.setSelectionRange(s, s);
    }
  } else {
    const s = inp.selectionStart, e = inp.selectionEnd;
    inp.value = inp.value.slice(0, s) + val + inp.value.slice(e);
    inp.setSelectionRange(s + val.length, s + val.length);
  }
  handleInputChange();
}

// ============================================================
// Equation management
// ============================================================
function handleInputKey(e) {
  if (e.key === 'Enter') addCurrentEquation();
}

let inputTimer = null;
function handleInputChange() {
  const v = document.getElementById('mainInput').value.trim();
  const prev = document.getElementById('inputPreview');
  if (!v) { prev.textContent = ''; return; }
  try {
    math.parse(v.replace(/\^/g, '^'));
    prev.textContent = '✓ Valid expression';
    prev.style.color = 'var(--accent3)';
  } catch(err) {
    prev.textContent = '✗ ' + err.message.split('\n')[0].slice(0,40);
    prev.style.color = '#ff6b6b';
  }
  // Real-time preview: update the "active" eq if editing
  if (activeEqIndex >= 0) {
    equations[activeEqIndex].expr = v;
    clearTimeout(inputTimer);
    inputTimer = setTimeout(() => { renderEqList(); draw(); }, 200);
  }
}

function addCurrentEquation() {
  const v = document.getElementById('mainInput').value.trim();
  if (!v) return;
  const color = COLORS[equations.length % COLORS.length];
  equations.push({ expr: v, color, visible: true, id: Date.now() });
  animProgress[equations.length - 1] = 0;
  document.getElementById('mainInput').value = '';
  document.getElementById('inputPreview').textContent = '';
  activeEqIndex = -1;
  detectSliders();
  renderEqList();
  animateNew(equations.length - 1);
}

function removeEquation(i) {
  equations.splice(i, 1);
  detectSliders();
  renderEqList();
  draw();
}

function toggleEquation(i) {
  equations[i].visible = !equations[i].visible;
  renderEqList();
  draw();
}

function editEquation(i) {
  activeEqIndex = i;
  document.getElementById('mainInput').value = equations[i].expr;
  document.getElementById('mainInput').focus();
  document.getElementById('inputPreview').textContent = '';
}

function renderEqList() {
  const list = document.getElementById('eqList');
  list.innerHTML = '';
  equations.forEach((eq, i) => {
    const item = document.createElement('div');
    item.className = 'eq-item' + (eq.visible ? '' : ' hidden');
    item.innerHTML = `
      <div class="eq-color-dot" style="background:${eq.color}"></div>
      <span class="eq-item-text ${isValidExpr(eq.expr) ? '' : 'error'}" title="${eq.expr}" onclick="editEquation(${i})">y = ${eq.expr}</span>
      <button class="eq-vis-btn" onclick="toggleEquation(${i})" title="Toggle">${eq.visible ? '👁' : '◯'}</button>
      <button class="eq-del-btn" onclick="removeEquation(${i})" title="Delete">✕</button>
    `;
    item.style.setProperty('--eq-color', eq.color);
    list.appendChild(item);
  });
}

function isValidExpr(expr) {
  try { math.parse(expr); return true; } catch { return false; }
}

// ============================================================
// Slider detection
// ============================================================
function detectSliders() {
  const allVars = new Set();
  equations.forEach(eq => {
    try {
      const node = math.parse(eq.expr);
      node.traverse(n => {
        if (n.isSymbolNode && !['x','pi','e','sin','cos','tan','log','sqrt','abs','cbrt'].includes(n.name)) {
          allVars.add(n.name);
        }
      });
    } catch {}
  });
  // Remove unused
  Object.keys(sliders).forEach(k => { if (!allVars.has(k)) delete sliders[k]; });
  allVars.forEach(v => { if (!(v in sliders)) sliders[v] = 1; });

  const sec = document.getElementById('slidersSection');
  const list = document.getElementById('sliderList');
  if (allVars.size === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = '';
  allVars.forEach(v => {
    const div = document.createElement('div');
    div.className = 'slider-item';
    div.innerHTML = `
      <div class="slider-header">
        <span class="slider-name">${v}</span>
        <span class="slider-val" id="sv_${v}">${sliders[v].toFixed(2)}</span>
      </div>
      <input type="range" class="slider-track" min="-10" max="10" step="0.1" value="${sliders[v]}"
             oninput="updateSlider('${v}', this.value)">
    `;
    list.appendChild(div);
  });
}

function updateSlider(name, val) {
  sliders[name] = parseFloat(val);
  document.getElementById('sv_' + name).textContent = parseFloat(val).toFixed(2);
  draw();
}

// ============================================================
// Canvas & Rendering
// ============================================================
function resize() {
  const main = document.getElementById('mainCanvas');
  canvas.width = main.clientWidth * devicePixelRatio;
  canvas.height = main.clientHeight * devicePixelRatio;
  canvas.style.width = main.clientWidth + 'px';
  canvas.style.height = main.clientHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}

function worldToScreen(wx, wy) {
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const x = (wx - viewport.xMin) / (viewport.xMax - viewport.xMin) * W;
  const y = H - (wy - viewport.yMin) / (viewport.yMax - viewport.yMin) * H;
  return { x, y };
}

function screenToWorld(sx, sy) {
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const wx = viewport.xMin + sx / W * (viewport.xMax - viewport.xMin);
  const wy = viewport.yMin + (1 - sy / H) * (viewport.yMax - viewport.yMin);
  return { x: wx, y: wy };
}

function draw(timestamp) {
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const isDarkMode = document.documentElement.getAttribute('data-theme') !== 'light';

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = isDarkMode ? '#08090c' : '#f5f4f0';
  ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid(W, H, isDarkMode);

  // Equations
  equations.forEach((eq, i) => {
    if (!eq.visible) return;
    const progress = animProgress[i] !== undefined ? animProgress[i] : 1;
    drawEquation(eq, W, H, progress);
  });
}

function drawGrid(W, H, isDark) {
  const step = niceStep(viewport.xMax - viewport.xMin, 10);
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';
  ctx.lineWidth = 1;

  // Vertical lines
  const xStart = Math.ceil(viewport.xMin / step) * step;
  for (let x = xStart; x <= viewport.xMax; x += step) {
    const sx = worldToScreen(x, 0).x;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
  }

  // Horizontal lines
  const yStep = niceStep(viewport.yMax - viewport.yMin, 10);
  const yStart = Math.ceil(viewport.yMin / yStep) * yStep;
  for (let y = yStart; y <= viewport.yMax; y += yStep) {
    const sy = worldToScreen(0, y).y;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1.5;
  const origin = worldToScreen(0, 0);
  if (origin.x >= 0 && origin.x <= W) {
    ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, H); ctx.stroke();
  }
  if (origin.y >= 0 && origin.y <= H) {
    ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(W, origin.y); ctx.stroke();
  }

  // Labels
  ctx.fillStyle = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
  ctx.font = '10px Space Mono, monospace';
  ctx.textAlign = 'center';

  for (let x = xStart; x <= viewport.xMax; x += step) {
    if (Math.abs(x) < step * 0.01) continue;
    const sx = worldToScreen(x, 0).x;
    const labelY = Math.min(Math.max(origin.y + 14, 14), H - 4);
    ctx.fillText(formatNum(x), sx, labelY);
  }

  ctx.textAlign = 'right';
  for (let y = yStart; y <= viewport.yMax; y += yStep) {
    if (Math.abs(y) < yStep * 0.01) continue;
    const sy = worldToScreen(0, y).y;
    const labelX = Math.min(Math.max(origin.x - 4, 4), W - 4);
    ctx.fillText(formatNum(y), labelX, sy + 3);
  }
}

function drawEquation(eq, W, H, progress) {
  const samples = Math.max(W * 2, 800);
  const dx = (viewport.xMax - viewport.xMin) / samples;
  let compiled;
  try { compiled = math.compile(eq.expr); } catch { return; }

  const scope = { ...sliders, pi: Math.PI, e: Math.E };
  const points = [];
  for (let i = 0; i <= samples; i++) {
    const x = viewport.xMin + i * dx;
    scope.x = x;
    let y;
    try { y = compiled.evaluate(scope); } catch { y = NaN; }
    if (typeof y !== 'number') y = NaN;
    points.push({ x, y });
  }

  // Apply animation progress
  const drawCount = Math.floor(points.length * progress);

  ctx.beginPath();
  ctx.strokeStyle = eq.color;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // Glow effect
  ctx.shadowColor = eq.color;
  ctx.shadowBlur = 8;

  let penDown = false;
  let prevY = NaN;

  for (let i = 0; i < drawCount; i++) {
    const p = points[i];
    if (isNaN(p.y) || !isFinite(p.y)) { penDown = false; prevY = NaN; continue; }

    const sp = worldToScreen(p.x, p.y);
    // Discontinuity detection
    if (penDown && Math.abs(p.y - prevY) > (viewport.yMax - viewport.yMin) * 1.5) {
      penDown = false;
    }
    if (!penDown) { ctx.moveTo(sp.x, sp.y); penDown = true; }
    else ctx.lineTo(sp.x, sp.y);
    prevY = p.y;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function niceStep(range, targetCount) {
  const rough = range / targetCount;
  const pow = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / pow;
  let nice = norm < 1.5 ? 1 : norm < 3.5 ? 2 : norm < 7.5 ? 5 : 10;
  return nice * pow;
}

function formatNum(n) {
  if (Math.abs(n) >= 1000 || (Math.abs(n) < 0.01 && n !== 0)) return n.toExponential(1);
  return parseFloat(n.toPrecision(4)).toString();
}

// ============================================================
// Animation
// ============================================================
function animateNew(idx) {
  animProgress[idx] = 0;
  const start = performance.now();
  const duration = 800;
  function step(ts) {
    const t = Math.min((ts - start) / duration, 1);
    animProgress[idx] = easeOutCubic(t);
    draw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// ============================================================
// Pan & Zoom
// ============================================================
canvas.addEventListener('mousedown', e => {
  isPanning = true;
  panStart = { x: e.clientX, y: e.clientY };
  panViewport = { ...viewport };
  canvas.style.cursor = 'grabbing';
});
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  const coords = document.getElementById('cursorCoords');
  coords.style.display = 'block';
  coords.style.left = (sx + 12) + 'px';
  coords.style.top = (sy - 28) + 'px';
  coords.textContent = `(${w.x.toFixed(2)}, ${w.y.toFixed(2)})`;

  if (!isPanning) return;
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  const dx = (e.clientX - panStart.x) / W * (panViewport.xMax - panViewport.xMin);
  const dy = (e.clientY - panStart.y) / H * (panViewport.yMax - panViewport.yMin);
  viewport.xMin = panViewport.xMin - dx;
  viewport.xMax = panViewport.xMax - dx;
  viewport.yMin = panViewport.yMin + dy;
  viewport.yMax = panViewport.yMax + dy;
  syncViewportInputs();
  draw();
});
canvas.addEventListener('mouseup', () => { isPanning = false; canvas.style.cursor = 'crosshair'; });
canvas.addEventListener('mouseleave', () => {
  isPanning = false; canvas.style.cursor = 'crosshair';
  document.getElementById('cursorCoords').style.display = 'none';
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  const factor = e.deltaY > 0 ? 1.15 : 0.87;
  viewport.xMin = w.x + (viewport.xMin - w.x) * factor;
  viewport.xMax = w.x + (viewport.xMax - w.x) * factor;
  viewport.yMin = w.y + (viewport.yMin - w.y) * factor;
  viewport.yMax = w.y + (viewport.yMax - w.y) * factor;
  syncViewportInputs();
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isPanning = true;
    panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    panViewport = { ...viewport };
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isPanning) {
    const W = canvas.width / devicePixelRatio;
    const H = canvas.height / devicePixelRatio;
    const dx = (e.touches[0].clientX - panStart.x) / W * (panViewport.xMax - panViewport.xMin);
    const dy = (e.touches[0].clientY - panStart.y) / H * (panViewport.yMax - panViewport.yMin);
    viewport.xMin = panViewport.xMin - dx;
    viewport.xMax = panViewport.xMax - dx;
    viewport.yMin = panViewport.yMin + dy;
    viewport.yMax = panViewport.yMax + dy;
    syncViewportInputs(); draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const factor = lastTouchDist / dist;
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const w = screenToWorld(cx, cy);
    viewport.xMin = w.x + (viewport.xMin - w.x) * factor;
    viewport.xMax = w.x + (viewport.xMax - w.x) * factor;
    viewport.yMin = w.y + (viewport.yMin - w.y) * factor;
    viewport.yMax = w.y + (viewport.yMax - w.y) * factor;
    lastTouchDist = dist;
    syncViewportInputs(); draw();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isPanning = false; }, { passive: true });
canvas.style.cursor = 'crosshair';

// ============================================================
// Viewport controls
// ============================================================
function updateViewport() {
  const xmin = parseFloat(document.getElementById('xmin').value);
  const xmax = parseFloat(document.getElementById('xmax').value);
  const ymin = parseFloat(document.getElementById('ymin').value);
  const ymax = parseFloat(document.getElementById('ymax').value);
  if (xmin < xmax && ymin < ymax) {
    viewport = { xMin: xmin, xMax: xmax, yMin: ymin, yMax: ymax };
    draw();
  }
}

function syncViewportInputs() {
  document.getElementById('xmin').value = viewport.xMin.toFixed(2);
  document.getElementById('xmax').value = viewport.xMax.toFixed(2);
  document.getElementById('ymin').value = viewport.yMin.toFixed(2);
  document.getElementById('ymax').value = viewport.yMax.toFixed(2);
}

function resetViewport() {
  viewport = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };
  syncViewportInputs();
  draw();
}

function zoomIn() {
  const cx = (viewport.xMin + viewport.xMax) / 2;
  const cy = (viewport.yMin + viewport.yMax) / 2;
  const rX = (viewport.xMax - viewport.xMin) * 0.4;
  const rY = (viewport.yMax - viewport.yMin) * 0.4;
  viewport = { xMin: cx - rX, xMax: cx + rX, yMin: cy - rY, yMax: cy + rY };
  syncViewportInputs(); draw();
}

function zoomOut() {
  const cx = (viewport.xMin + viewport.xMax) / 2;
  const cy = (viewport.yMin + viewport.yMax) / 2;
  const rX = (viewport.xMax - viewport.xMin) * 0.65;
  const rY = (viewport.yMax - viewport.yMin) * 0.65;
  viewport = { xMin: cx - rX, xMax: cx + rX, yMin: cy - rY, yMax: cy + rY };
  syncViewportInputs(); draw();
}

// ============================================================
// Save / Load / Export
// ============================================================
function saveEquations() {
  localStorage.setItem('mathviz_equations', JSON.stringify(equations));
  localStorage.setItem('mathviz_sliders', JSON.stringify(sliders));
  showToast('Equations saved!');
}

function loadEquations() {
  const saved = localStorage.getItem('mathviz_equations');
  if (!saved) { showToast('No saved equations found'); return; }
  equations = JSON.parse(saved);
  sliders = JSON.parse(localStorage.getItem('mathviz_sliders') || '{}');
  equations.forEach((_, i) => { animProgress[i] = 1; });
  detectSliders();
  renderEqList();
  draw();
  showToast('Equations loaded!');
}

function toggleExport() {
  const m = document.getElementById('exportMenu');
  m.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('[onclick="toggleExport()"]') && !e.target.closest('#exportMenu')) {
    document.getElementById('exportMenu').classList.remove('open');
  }
});

function exportPNG() {
  document.getElementById('exportMenu').classList.remove('open');
  const link = document.createElement('a');
  link.download = 'mathviz-graph.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('PNG exported!');
}

function exportSVGFile() {
  document.getElementById('exportMenu').classList.remove('open');
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  let svgLines = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`];
  svgLines.push(`<rect width="${W}" height="${H}" fill="#08090c"/>`);
  equations.forEach(eq => {
    if (!eq.visible) return;
    const samples = W * 2;
    const dx = (viewport.xMax - viewport.xMin) / samples;
    let compiled;
    try { compiled = math.compile(eq.expr); } catch { return; }
    const scope = { ...sliders, pi: Math.PI, e: Math.E };
    let d = ''; let penDown = false; let prevY = NaN;
    for (let i = 0; i <= samples; i++) {
      const x = viewport.xMin + i * dx;
      scope.x = x;
      let y; try { y = compiled.evaluate(scope); } catch { y = NaN; }
      if (typeof y !== 'number' || !isFinite(y)) { penDown = false; prevY = NaN; continue; }
      if (penDown && Math.abs(y - prevY) > (viewport.yMax - viewport.yMin) * 1.5) penDown = false;
      const sp = worldToScreen(x, y);
      if (!penDown) { d += `M ${sp.x.toFixed(1)} ${sp.y.toFixed(1)} `; penDown = true; }
      else d += `L ${sp.x.toFixed(1)} ${sp.y.toFixed(1)} `;
      prevY = y;
    }
    svgLines.push(`<path d="${d}" stroke="${eq.color}" stroke-width="2.5" fill="none"/>`);
  });
  svgLines.push('</svg>');
  const blob = new Blob([svgLines.join('\n')], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = 'mathviz-graph.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  showToast('SVG exported!');
}

// ============================================================
// Theme
// ============================================================
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
  document.querySelector('.theme-toggle').textContent = isDark ? '☀' : '☾';
  draw();
}

// ============================================================
// Toast
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// Init
// ============================================================
window.addEventListener('resize', resize);
buildKeyboard();
resize();

// Add default equations after intro
setTimeout(() => {
  const defaults = [
    { expr: 'sin(x)', color: COLORS[0] },
    { expr: 'x^2 / 4', color: COLORS[1] },
  ];
  defaults.forEach((d, i) => {
    equations.push({ ...d, visible: true, id: Date.now() + i });
    animProgress[i] = 0;
  });
  renderEqList();
  defaults.forEach((_, i) => animateNew(i));
}, 2900);
